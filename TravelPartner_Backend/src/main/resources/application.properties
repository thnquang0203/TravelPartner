spring.application.name=TravelPartner

spring.datasource.url=jdbc:sqlserver://PUN:1433;databaseName=TravelPartnerDB;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=123
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.physical_naming_strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

server.port=8080

jwt.secret=ChangeThisToALongRandomSecretKeyAtLeast256BitsForHS256Algorithm
jwt.expiration=86400000
jwt.refresh-expiration=604800000

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html